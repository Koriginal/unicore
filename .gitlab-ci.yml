stages:
  - build
  - upload
  - release

variables:
  PACKAGE_NAME: "unicore"
  # Set these in GitLab Project Settings -> CI/CD -> Variables
  # GITLAB_TOKEN: A Personal Access Token with api scope

build_job:
  stage: build
  image: oven/bun:latest
  script:
    - bun install
    - ./scripts/package-release.sh
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 day

upload_job:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - build_job
  script:
    - |
      VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[", ]//g')
      PLATFORM="linux"
      ARCH="x64"
      # Locate the generated tarball in artifacts dir
      PACKAGE_FILE=$(ls artifacts/*.tar.gz | head -1)
      FILENAME=$(basename "$PACKAGE_FILE")
      
      echo "Uploading ${FILENAME} to GitLab Package Registry..."
      
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${PACKAGE_FILE}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${VERSION}/${FILENAME}"

  rules:
    - if: $CI_COMMIT_TAG
